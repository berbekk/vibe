<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a12">
  <title>Pattern — рисование паттернов</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/controls.css">
</head>
<body>
  <div id="desktop-warning" class="desktop-warning" hidden>
    <div class="desktop-warning__card">
      <h1>Только для мобильных</h1>
      <p>Откройте этот сайт на телефоне, чтобы рисовать паттерны пальцем.</p>
    </div>
  </div>

  <div id="app" class="app" hidden>
    <canvas id="canvas" class="canvas"></canvas>

    <header class="top-bar">
      <h1 class="top-bar__title">Pattern</h1>
      <button type="button" id="toggle-panel" class="icon-btn" aria-label="Панель инструментов">
        <span class="icon-btn__glyph">✦</span>
      </button>
    </header>

    <aside id="panel" class="panel panel--open">
      <section class="panel__section">
        <h2 class="panel__label">Режим</h2>
        <div class="mode-grid" id="mode-grid"></div>
      </section>

      <section class="panel__section">
        <h2 class="panel__label">Симметрия</h2>
        <div class="symmetry-row" id="symmetry-row"></div>
      </section>

      <section class="panel__section">
        <h2 class="panel__label">Палитра</h2>
        <div class="palette" id="palette"></div>
      </section>

      <section class="panel__section">
        <label class="panel__label" for="brush-size">Размер кисти</label>
        <input type="range" id="brush-size" class="slider" min="2" max="24" value="8">
      </section>

      <section class="panel__section panel__section--row">
        <label class="toggle">
          <input type="checkbox" id="glow-toggle" checked>
          <span class="toggle__track"></span>
          <span class="toggle__text">Свечение</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="rainbow-toggle" checked>
          <span class="toggle__track"></span>
          <span class="toggle__text">Радуга</span>
        </label>
      </section>

      <div class="panel__actions">
        <button type="button" id="undo-btn" class="action-btn">Отменить</button>
        <button type="button" id="clear-btn" class="action-btn action-btn--danger">Очистить</button>
      </div>
    </aside>

    <p class="hint" id="hint">Ведите пальцем по экрану</p>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
