<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#000000">
  <title>Pattern</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/controls.css">
  <link rel="stylesheet" href="css/ios.css">
</head>
<body>
  <div id="desktop-warning" class="desktop-warning" hidden>
    <div class="desktop-warning__card">
      <h1>Только для iPhone</h1>
      <p>Откройте сайт в Safari на iPhone.</p>
    </div>
  </div>

  <div id="app" class="app" hidden>
    <canvas id="canvas" class="canvas"></canvas>

    <nav class="tab-bar" id="tab-bar" aria-label="Действия">
      <button type="button" id="toggle-panel" class="tab-bar__item tab-bar__item--active" aria-label="Кисть" aria-current="page">
        <img src="icons/tab-brush.svg" alt="" class="tab-bar__icon" width="24" height="24">
        <span class="tab-bar__label">Кисть</span>
      </button>
      <button type="button" id="dock-undo" class="tab-bar__item" aria-label="Отменить">
        <img src="icons/tab-undo.svg" alt="" class="tab-bar__icon" width="24" height="24">
        <span class="tab-bar__label">Отменить</span>
      </button>
      <button type="button" id="dock-share" class="tab-bar__item" aria-label="Поделиться" hidden>
        <img src="icons/tab-share.svg" alt="" class="tab-bar__icon" width="24" height="24">
        <span class="tab-bar__label">Поделиться</span>
      </button>
      <button type="button" id="dock-clear" class="tab-bar__item" aria-label="Очистить">
        <img src="icons/tab-trash.svg" alt="" class="tab-bar__icon" width="24" height="24">
        <span class="tab-bar__label">Очистить</span>
      </button>
    </nav>

    <div id="panel-backdrop" class="sheet-scrim" hidden></div>

    <aside id="panel" class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
      <div class="sheet__grabber" id="panel-handle" aria-hidden="true"></div>

      <header class="sheet__header">
        <h2 class="sheet__title" id="sheet-title">Кисть</h2>
      </header>

      <div class="sheet__scroll">
        <section class="group">
          <h3 class="group__title">Режим</h3>
          <div class="group__card">
            <div class="segmented" id="mode-grid" role="tablist" aria-label="Режим рисования"></div>
          </div>
        </section>

        <section class="group">
          <h3 class="group__title">Симметрия</h3>
          <div class="group__card group__card--chips">
            <div class="chip-row" id="symmetry-row"></div>
          </div>
        </section>

        <section class="group">
          <h3 class="group__title">Цвет</h3>
          <div class="group__card group__card--palette">
            <div class="palette" id="palette"></div>
          </div>
        </section>

        <section class="group">
          <h3 class="group__title">Размер</h3>
          <div class="group__card group__card--slider">
            <div class="slider-row">
              <span class="slider-row__label">Толщина линии</span>
              <span class="slider-row__value" id="brush-size-value">8</span>
            </div>
            <input type="range" id="brush-size" class="slider" min="2" max="24" value="8" aria-label="Толщина линии">
          </div>
        </section>

        <section class="group">
          <div class="group__card group__card--list">
            <label class="list-row">
              <span class="list-row__label">Свечение</span>
              <input type="checkbox" id="glow-toggle" class="switch" checked>
            </label>
            <label class="list-row">
              <span class="list-row__label">Радуга</span>
              <input type="checkbox" id="rainbow-toggle" class="switch" checked>
            </label>
          </div>
        </section>

        <section class="group" id="ios-section" hidden>
          <h3 class="group__title">Датчики</h3>
          <div class="group__card group__card--list">
            <label class="list-row">
              <span class="list-row__label">Наклон устройства</span>
              <input type="checkbox" id="motion-toggle" class="switch">
            </label>
            <p class="list-footnote" id="motion-status" hidden></p>
          </div>
        </section>
      </div>
    </aside>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
