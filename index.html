<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#000000">
  <title>Pattern</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/controls.css">
  <link rel="stylesheet" href="css/ios.css">
</head>
<body>
  <div id="desktop-warning" class="desktop-warning" hidden>
    <div class="desktop-warning__card">
      <h1>Только для iPhone</h1>
      <p>Откройте сайт в Safari на iPhone.</p>
    </div>
  </div>

  <div id="app" class="app" hidden>
    <canvas id="canvas" class="canvas"></canvas>

    <div id="chrome" class="chrome">
      <header class="toolbar">
        <div class="toolbar__group">
          <button type="button" id="btn-brush" class="tool-btn" data-popover="popover-brush" aria-label="Кисть">
            <img src="icons/tab-brush.svg" alt="" width="22" height="22">
          </button>
          <button type="button" id="btn-mode" class="tool-btn" data-popover="popover-mode" aria-label="Режим">
            <img src="icons/tab-mode.svg" alt="" width="22" height="22">
          </button>
          <button type="button" id="btn-color" class="tool-btn" data-popover="popover-color" aria-label="Цвет">
            <img src="icons/tab-color.svg" alt="" width="22" height="22">
          </button>
          <button type="button" id="btn-symmetry" class="tool-btn" data-popover="popover-symmetry" aria-label="Симметрия">
            <img src="icons/tab-symmetry.svg" alt="" width="22" height="22">
          </button>
        </div>
        <div class="toolbar__group">
          <button type="button" id="dock-undo" class="tool-btn" aria-label="Отменить">
            <img src="icons/tab-undo.svg" alt="" width="22" height="22">
          </button>
          <button type="button" id="dock-share" class="tool-btn" aria-label="Поделиться" hidden>
            <img src="icons/tab-share.svg" alt="" width="22" height="22">
          </button>
          <button type="button" id="dock-clear" class="tool-btn" aria-label="Очистить">
            <img src="icons/tab-trash.svg" alt="" width="22" height="22">
          </button>
          <button type="button" id="btn-settings" class="tool-btn" data-popover="popover-settings" aria-label="Настройки" hidden>
            <img src="icons/tab-settings.svg" alt="" width="22" height="22">
          </button>
        </div>
      </header>

      <div id="popover-brush" class="popover" hidden>
        <div class="popover__row">
          <span class="popover__label">Размер</span>
          <span class="popover__value" id="brush-size-value">8</span>
        </div>
        <input type="range" id="brush-size" class="slider" min="2" max="24" value="8">
        <div class="popover__toggles">
          <label class="popover__toggle">
            <span>Свечение</span>
            <input type="checkbox" id="glow-toggle" class="switch" checked>
          </label>
          <label class="popover__toggle">
            <span>Радуга</span>
            <input type="checkbox" id="rainbow-toggle" class="switch" checked>
          </label>
        </div>
      </div>

      <div id="popover-mode" class="popover" hidden>
        <div class="segmented" id="mode-grid"></div>
      </div>

      <div id="popover-color" class="popover" hidden>
        <div class="palette" id="palette"></div>
      </div>

      <div id="popover-symmetry" class="popover" hidden>
        <div class="chip-row" id="symmetry-row"></div>
      </div>

      <div id="popover-settings" class="popover" hidden>
        <label class="popover__toggle">
          <span>Наклон устройства</span>
          <input type="checkbox" id="motion-toggle" class="switch">
        </label>
        <p class="popover__note" id="motion-status" hidden></p>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
